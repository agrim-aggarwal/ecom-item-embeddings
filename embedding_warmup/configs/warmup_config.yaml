cat: "Baby Products"

# Paths (relative to project root)
tokenizer_dir: vocab/tokenizer/v1
new_tokens_dir: vocab/new_tokens
data_dir: data/raw
processed_dir: data/processed
checkpoint_dir: models/embedding_warmup_checkpoint
loss_log_file: logs/embedding_warmup_loss.jsonl
eval_log_file: logs/embedding_warmup_eval.jsonl

# Data splitting
train_split: 0.9
random_seed: 42
callback_set_size: 10000

# Tokenization — median seq length is 348, P90 is 515; 512 is the right cap
max_length: 512

# MLM
mlm_probability: 0.15

# Training
# bf16 is supported on Apple Silicon MPS (PyTorch 2.x) and gives ~2x compute speedup.
# fp16 remains off — MPS fp16 is unreliable.
# Increase batch size from 8 → 16: bf16 halves weight memory, frozen params
# mean no optimizer states beyond the embedding row, so headroom is large.
per_device_train_batch_size: 8
num_train_epochs: 3
learning_rate: 5.0e-5
bf16: true
fp16: false
dataloader_pin_memory: false   # MPS ignores pin_memory; disabling avoids the overhead

# Logging / checkpointing
eval_steps: 64
save_steps: 1000
